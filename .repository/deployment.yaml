apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: gitea
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
      - name: web
        image: ttl.sh/gitea-demo-app:24h
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app-svc
  namespace: gitea
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: demo-app
