apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea-runner
  namespace: gitea
  labels:
    app: gitea-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitea-runner
  template:
    metadata:
      labels:
        app: gitea-runner
    spec:
      nodeSelector:
        kind: gitea-runners
      containers:
      - name: dind
        image: docker:dind
        args: ["--insecure-registry", "gitea-http:3000", "--insecure-registry", "k3d-gitea-registry:5000"]
        securityContext:
          privileged: true
        env:
        - name: DOCKER_TLS_CERTDIR
          value: ""
        volumeMounts:
        - name: docker-storage
          mountPath: /var/lib/docker

      - name: runner
        image: gitea/act_runner:latest
        command:
        - bash
        - -c
        - |
          # Wait for DinD daemon to be ready (no docker CLI needed)
          until (echo > /dev/tcp/localhost/2375) 2>/dev/null; do
            echo "Waiting for DinD..."; sleep 2
          done

          cat << 'EOF' > config.yaml
          container:
            network: "host"
            privileged: true
            options: "-e DOCKER_HOST=tcp://localhost:2375"
            volumes:
              - /var/run/docker.sock:/var/run/docker.sock
          EOF

          act_runner register \
            --no-interactive \
            --instance "$GITEA_INSTANCE_URL" \
            --token "$GITEA_RUNNER_TOKEN" \
            --name "$GITEA_RUNNER_NAME" \
            --labels "$GITEA_RUNNER_LABELS" \
            --config config.yaml && \

          act_runner daemon --config config.yaml
        env:
        - name: DOCKER_HOST
          value: "tcp://localhost:2375"
        - name: GITEA_INSTANCE_URL
          value: "http://gitea-http:3000" # K8S DNS, works inside pod
        - name: GITEA_RUNNER_TOKEN
          value: "GITEA_RUNNER_TOKEN" # <-- Paste your real token
        - name: GITEA_RUNNER_NAME
          value: "k3d-demo-runner"
        - name: GITEA_RUNNER_LABELS
          value: "ubuntu-latest:docker://catthehacker/ubuntu:act-22.04,ubuntu-22.04:docker://catthehacker/ubuntu:act-22.04,k8s-deploy:docker://bitnami/kubectl:latest"
        securityContext:
          privileged: true

      volumes:
      - name: docker-storage
        emptyDir: {}
